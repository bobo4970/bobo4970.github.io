<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AROBICMD | Interactive Leg Injury Explorer</title>
  
  <style>
    /* ============================================
       CSS RESET & BASE STYLES
       ============================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ============================================
       GLOBAL DOT GRID BACKGROUND
       Applied directly to the body so it covers
       the ENTIRE page including behind all UI elements.
       ============================================ */
    body {
      background-color: #151517;
      background-image: radial-gradient(rgba(255, 255, 255, 0.07) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    /* ============================================
       HEADER / BRANDING
       Semi-transparent so the dot grid shows through
       ============================================ */
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      
      /* Transparent background - dot grid shows through */
      background: rgba(21, 21, 23, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
      z-index: 100;
    }

    #header h1 {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: 4px;
      color: #ffffff;
      text-transform: uppercase;
    }

    #header .brand-accent {
      color: #3b82f6;
    }

    #header .subtitle {
      position: absolute;
      right: 24px;
      font-size: 0.72rem;
      color: #4a4a5a;
      font-weight: 400;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ============================================
       MAIN LAYOUT CONTAINER
       Transparent so dot grid shows through
       ============================================ */
    #main-container {
      position: fixed;
      top: 64px;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      height: calc(100vh - 64px);
      z-index: 1;
    }

    /* ============================================
       3D CANVAS CONTAINER
       Transparent background - dot grid visible behind
       ============================================ */
    #canvas-container {
      flex: 1;
      position: relative;
      /* No solid background - transparent */
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    #canvas-container canvas:active {
      cursor: grabbing;
    }

    /* ============================================
       INSTRUCTION OVERLAY
       Semi-transparent glass effect
       ============================================ */
    #instruction-overlay {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      
      background: rgba(21, 21, 23, 0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      
      padding: 10px 18px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 0.8rem;
      color: #6a6a7a;
      text-align: center;
      pointer-events: none;
      transition: opacity 0.5s ease;
      z-index: 10;
    }

    #instruction-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ============================================
       RIGHT INFO PANEL
       Semi-transparent dark glass - dot grid visible behind
       ============================================ */
    #info-panel {
      width: 400px;
      
      /* Transparent dark glass */
      background: rgba(21, 21, 23, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      
      border-left: 1px solid rgba(255, 255, 255, 0.05);
      
      padding: 24px;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      z-index: 50;
    }

    #info-panel.visible {
      transform: translateX(0);
    }

    #panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    #panel-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #e8e8ec;
    }

    #close-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1rem;
      color: #5a5a6a;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    #close-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #b0b0b8;
    }

    #part-tag {
      display: inline-block;
      padding: 4px 10px;
      background: rgba(59, 130, 246, 0.1);
      color: #3b82f6;
      font-size: 0.68rem;
      font-weight: 600;
      border-radius: 6px;
      margin-bottom: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    #part-description {
      font-size: 0.88rem;
      line-height: 1.65;
      color: #8a8a9a;
      margin-bottom: 20px;
    }

    #injuries-heading {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #4a4a5a;
      margin-bottom: 12px;
    }

    .injury-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 10px;
      transition: all 0.2s;
    }

    .injury-card:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.08);
    }

    .injury-name {
      font-weight: 600;
      font-size: 0.92rem;
      color: #d8d8dc;
      margin-bottom: 4px;
    }

    .injury-detail {
      font-size: 0.8rem;
      color: #5a5a6a;
      line-height: 1.5;
    }

    .severity {
      display: inline-flex;
      gap: 4px;
      margin-top: 8px;
      align-items: center;
    }
    
    .severity-label {
      font-size: 0.62rem;
      color: #4a4a5a;
      margin-left: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .severity-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #2a2a30;
      transition: background 0.2s;
    }
    .severity-dot.active { background: #3b82f6; }
    .severity-dot.active.sev-high { background: #ef4444; }

    #panel-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #2a2a34;
      text-align: center;
      padding: 40px 20px;
    }
    
    #panel-placeholder svg {
      width: 48px;
      height: 48px;
      margin-bottom: 16px;
      opacity: 0.25;
      color: #4a4a5a;
    }
    
    #panel-placeholder p {
      font-size: 0.82rem;
      line-height: 1.6;
      color: #4a4a5a;
    }

    /* ============================================
       SCROLL BAR STYLING (for info panel)
       Custom dark scrollbar
       ============================================ */
    #info-panel::-webkit-scrollbar {
      width: 6px;
    }
    #info-panel::-webkit-scrollbar-track {
      background: transparent;
    }
    #info-panel::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }
    #info-panel::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    /* ============================================
       LOADING SCREEN
       ============================================ */
    #loader {
      position: fixed;
      inset: 0;
      background: #151517;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.4s ease;
    }

    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #2a2a30;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loader-text {
      margin-top: 16px;
      font-size: 0.85rem;
      color: #5a5a6a;
    }

    /* ============================================
       RESPONSIVE ADJUSTMENTS
       ============================================ */
    @media (max-width: 900px) {
      #info-panel {
        width: 100%;
        position: absolute;
        top: 0;
        right: 0;
        height: 100%;
        z-index: 50;
      }
      #header .subtitle {
        display: none;
      }
    }
  </style>
  
  <!-- THREE.JS IMPORT MAP -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>

  <!-- 
    BACKGROUND: Applied directly to body via CSS
    The dot grid pattern covers the entire page
    so all UI elements sit on top of it
  -->

  <!-- LOADING SCREEN -->
  <div id="loader">
    <div class="spinner"></div>
    <div id="loader-text">Loading 3D Model...</div>
  </div>

  <!-- HEADER with centered logo -->
  <div id="header">
    <h1>AROBIC<span class="brand-accent">MD</span></h1>
    <span class="subtitle">Interactive Leg Injury Explorer</span>
  </div>

  <!-- MAIN APP CONTAINER -->
  <div id="main-container">
    
    <!-- 3D VIEWPORT -->
    <div id="canvas-container">
      <canvas id="webgl-canvas"></canvas>
      
      <div id="instruction-overlay">
        Click any part of the leg to explore common injuries
      </div>
    </div>

    <!-- RIGHT INFO PANEL -->
    <div id="info-panel">
      <div id="panel-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 8v4l2 2"/>
        </svg>
        <p>Select a part of the leg to view<br>common injuries & strains</p>
      </div>

      <div id="panel-content" style="display: none;">
        <div id="panel-header">
          <div id="panel-title">Select a Region</div>
          <button id="close-btn" title="Close panel">✕</button>
        </div>
        <div id="part-tag">Region</div>
        <div id="part-description">Description will appear here.</div>
        
        <div id="injuries-heading">Common Injuries</div>
        <div id="injuries-list"></div>
      </div>
    </div>

  </div>

  <!-- MAIN JAVASCRIPT MODULE -->
  <script type="module">
    /* ============================================
       IMPORT THREE.JS COMPONENTS
       ============================================ */
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    /* ============================================
       DOM REFERENCES
       ============================================ */
    const container = document.getElementById('canvas-container');
    const canvas = document.getElementById('webgl-canvas');
    const loader = document.getElementById('loader');
    const instructionOverlay = document.getElementById('instruction-overlay');
    const infoPanel = document.getElementById('info-panel');
    const panelPlaceholder = document.getElementById('panel-placeholder');
    const panelContent = document.getElementById('panel-content');
    const panelTitle = document.getElementById('panel-title');
    const partTag = document.getElementById('part-tag');
    const partDesc = document.getElementById('part-description');
    const injuriesList = document.getElementById('injuries-list');
    const closeBtn = document.getElementById('close-btn');

    /* ============================================
       INJURY DATA MAPPING
       Update keys to match your model's mesh names
       ============================================ */
    const INJURY_DATA = {
      "UpperLeg": {
        displayName: "Upper Leg (Quadriceps & Hamstrings)",
        description: "The upper leg contains powerful muscle groups essential for running and cycling. The quadriceps extend the knee while the hamstrings flex it.",
        injuries: [
          { name: "Quadriceps Strain", detail: "Overstretching or tearing of thigh muscles, common in sprinters and cyclists during steep climbs.", severity: 2 },
          { name: "Hamstring Strain", detail: "Frequent in runners during late swing phase. Ranges from mild tightness to complete muscle rupture.", severity: 3 },
          { name: "IT Band Syndrome", detail: "Friction of the iliotibial band against the lateral femur. Common in long-distance runners.", severity: 2 }
        ]
      },
      "LowerLeg": {
        displayName: "Lower Leg (Calves & Shin)",
        description: "The lower leg handles impact absorption and propulsion. Key structures include the gastrocnemius, soleus, and tibialis anterior.",
        injuries: [
          { name: "Calf Strain (Tennis Leg)", detail: "Tearing of calf muscles during explosive push-off movements. Very common in runners.", severity: 2 },
          { name: "Shin Splints (MTSS)", detail: "Pain along the shin bone from repetitive stress. Often seen when increasing mileage too quickly.", severity: 1 },
          { name: "Achilles Tendinopathy", detail: "Degeneration of the Achilles tendon from chronic overuse. Pain is typically worse in the morning.", severity: 3 }
        ]
      },
      "Knee": {
        displayName: "Knee Joint",
        description: "The knee is a complex hinge joint bearing significant load during running and cycling. It relies on ligaments, menisci, and cartilage for stability.",
        injuries: [
          { name: "Runner's Knee (Patellofemoral Pain)", detail: "Pain around the kneecap from improper tracking. The most common running-related injury.", severity: 2 },
          { name: "Meniscus Tear", detail: "Damage to knee cartilage from twisting or impact. Can cause catching or locking sensations.", severity: 3 },
          { name: "Patellar Tendinitis", detail: "Inflammation of the tendon connecting kneecap to shin. Common in cyclists with low seat height.", severity: 2 },
          { name: "ACL Sprain", detail: "Ligament injury from sudden stops or pivots. Less common in straight-line running but possible.", severity: 3 }
        ]
      },
      "Ankle": {
        displayName: "Ankle & Foot",
        description: "The ankle connects the leg to the foot and absorbs ground reaction forces. Stability depends on ligaments, tendons, and bone structure.",
        injuries: [
          { name: "Ankle Sprain", detail: "Ligament overstretching from rolling the ankle. Most common acute injury in all athletes.", severity: 2 },
          { name: "Plantar Fasciitis", detail: "Inflammation of the foot's arch ligament. Sharp heel pain, especially with first steps in morning.", severity: 2 },
          { name: "Achilles Tendinopathy", detail: "Degeneration of the Achilles tendon from chronic overuse. Pain is typically worse in the morning.", severity: 3 }
        ]
      },
      "Hip": {
        displayName: "Hip & Glutes",
        description: "The hip is a ball-and-socket joint providing stability and power. Strong glutes are critical for running economy and cycling efficiency.",
        injuries: [
          { name: "Hip Flexor Strain", detail: "Overuse injury from repetitive leg lifting. Common in cyclists with aggressive riding positions.", severity: 2 },
          { name: "Piriformis Syndrome", detail: "Tight piriformis muscle compressing the sciatic nerve. Causes buttock pain radiating down the leg.", severity: 2 },
          { name: "Trochanteric Bursitis", detail: "Inflammation of the bursa on the outer hip. Pain worsens when lying on affected side.", severity: 1 }
        ]
      }
    };

    /* ============================================
       THREE.JS SCENE SETUP
       Scene background is transparent so the CSS
       dot grid shows through the canvas
       ============================================ */
    
    // Create scene - set background to null/transparent
    // so the CSS background behind the canvas is visible
    const scene = new THREE.Scene();
    scene.background = null; // Transparent - CSS dot grid shows through

    // Camera setup
    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
    camera.position.set(0, 1.5, 5);

    // Renderer with alpha enabled for transparency
    const renderer = new THREE.WebGLRenderer({ 
      canvas: canvas,
      antialias: true,
      alpha: true // Enable transparency so CSS background shows through
    });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;

    // OrbitControls setup
    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 2;
    controls.maxDistance = 12;
    controls.target.set(0, 1, 0);
    controls.update();

    /* ============================================
       LIGHTING SETUP
       Multi-light studio setup for anatomical detail
       ============================================ */
    
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    const mainLight = new THREE.DirectionalLight(0xffffff, 1.8);
    mainLight.position.set(3, 5, 4);
    mainLight.castShadow = true;
    scene.add(mainLight);

    const fillLight = new THREE.DirectionalLight(0xc8d6e5, 1.0);
    fillLight.position.set(-4, 2, -2);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0x3b82f6, 0.7);
    rimLight.position.set(0, 3, -5);
    scene.add(rimLight);

    const hemiLight = new THREE.HemisphereLight(0x1e293b, 0x0f172a, 0.5);
    scene.add(hemiLight);

    /* ============================================
       LOADING THE 3D MODEL
       ============================================ */
    
    let loadedModel = null;
    const modelLoader = new GLTFLoader();

    modelLoader.load(
      './leg_model.glb',
      
      // Success callback
      (gltf) => {
        console.log('Model loaded successfully');
        loadedModel = gltf.scene;
        
        // Auto-center and scale
        const boundingBox = new THREE.Box3().setFromObject(loadedModel);
        const center = boundingBox.getCenter(new THREE.Vector3());
        const size = boundingBox.getSize(new THREE.Vector3());
        
        loadedModel.position.sub(center);
        loadedModel.position.y += size.y / 2;
        
        const maxDimension = Math.max(size.x, size.y, size.z);
        const targetSize = 3;
        const scale = targetSize / maxDimension;
        loadedModel.scale.setScalar(scale);
        
        scene.add(loadedModel);
        
        // Store original material data for hover effects
        loadedModel.traverse((child) => {
          if (child.isMesh) {
            child.userData.originalColor = child.material ? child.material.color.clone() : null;
            child.userData.originalEmissive = child.material && child.material.emissive ? child.material.emissive.getHex() : 0x000000;
          }
        });
        
        // Frame camera
        const cameraDistance = targetSize * 1.6;
        camera.position.set(cameraDistance * 0.7, cameraDistance * 0.4, cameraDistance);
        controls.target.set(0, targetSize / 4, 0);
        controls.update();
        
        // Hide loading screen
        loader.classList.add('hidden');
        
        // Log mesh names for mapping
        console.log('=== MESH NAMES FROM YOUR MODEL ===');
        loadedModel.traverse((child) => {
          if (child.isMesh) {
            console.log(`"${child.name || 'unnamed'}" → Add to INJURY_DATA`);
          }
        });
      },
      
      // Progress callback
      (xhr) => {
        if (xhr.total > 0) {
          const percent = Math.round((xhr.loaded / xhr.total) * 100);
          document.getElementById('loader-text').textContent = `Loading 3D Model... ${percent}%`;
        }
      },
      
      // Error callback
      (error) => {
        console.error('Error loading model:', error);
        document.getElementById('loader-text').innerHTML = `
          <strong style="color: #ef4444;">Failed to load model</strong><br>
          <span style="font-size: 0.75rem; color: #5a5a6a;">
            Make sure leg_model.glb is in the same folder.
          </span>
        `;
      }
    );

    /* ============================================
       RAYCASTER & INTERACTION HANDLING
       ============================================ */
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    let hasInteracted = false;
    let isPanelOpen = false;

    // Track mouse state for distinguishing clicks from drags
    let mouseDownPosition = { x: 0, y: 0 };
    let mouseDownTime = 0;
    const DRAG_THRESHOLD = 5;
    const HOLD_THRESHOLD = 400;

    // Mouse down - record position
    canvas.addEventListener('mousedown', (event) => {
      mouseDownPosition.x = event.clientX;
      mouseDownPosition.y = event.clientY;
      mouseDownTime = Date.now();
    });

    // Mouse up - detect click vs drag
    canvas.addEventListener('mouseup', (event) => {
      if (!loadedModel) return;

      const deltaX = Math.abs(event.clientX - mouseDownPosition.x);
      const deltaY = Math.abs(event.clientY - mouseDownPosition.y);
      const distanceMoved = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
      const timeHeld = Date.now() - mouseDownTime;

      // If it was a drag, don't process as click
      if (distanceMoved > DRAG_THRESHOLD) return;
      if (timeHeld > HOLD_THRESHOLD) return;

      handleClick(event);
    });

    // Process a valid click
    function handleClick(event) {
      const rect = canvas.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(loadedModel, true);

      if (intersects.length > 0) {
        const clickedMesh = intersects[0].object;
        
        if (!hasInteracted) {
          instructionOverlay.classList.add('hidden');
          hasInteracted = true;
        }

        highlightMesh(clickedMesh);

        let injuryInfo = null;
        let matchedKey = '';

        if (INJURY_DATA[clickedMesh.name]) {
          injuryInfo = INJURY_DATA[clickedMesh.name];
          matchedKey = clickedMesh.name;
        } else {
          for (const key of Object.keys(INJURY_DATA)) {
            if (clickedMesh.name.toLowerCase().includes(key.toLowerCase()) ||
                key.toLowerCase().includes(clickedMesh.name.toLowerCase())) {
              injuryInfo = INJURY_DATA[key];
              matchedKey = key;
              break;
            }
          }
        }

        if (injuryInfo) {
          showInjuryPanel(injuryInfo, matchedKey);
          isPanelOpen = true;
        } else {
          console.log(`Mesh clicked: "${clickedMesh.name}" - Add to INJURY_DATA`);
          showInjuryPanel({
            displayName: clickedMesh.name || "Unknown Region",
            description: "Injury data not yet mapped. Check console for mesh name.",
            injuries: [
              { name: "Data Pending", detail: "Add this mesh name to INJURY_DATA.", severity: 0 }
            ]
          }, clickedMesh.name);
          isPanelOpen = true;
        }
      } else {
        // Clicked empty space - close panel
        closeInfoPanel();
        isPanelOpen = false;
      }
    }

    // Hover effects
    canvas.addEventListener('mousemove', (event) => {
      if (!loadedModel) return;

      const rect = canvas.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(loadedModel, true);

      loadedModel.traverse((child) => {
        if (child.isMesh && child.material) {
          child.material.emissive.setHex(child.userData.originalEmissive || 0x000000);
        }
      });

      if (intersects.length > 0) {
        const hoveredMesh = intersects[0].object;
        if (hoveredMesh.material) {
          hoveredMesh.material.emissive.setHex(0x1a2332);
        }
        canvas.style.cursor = 'pointer';
      } else {
        canvas.style.cursor = 'grab';
      }
    });

    /* ============================================
       SCROLL HANDLER - MOVE MODEL UP/DOWN
       
       OVERRIDE: Instead of zooming with the mouse wheel,
       scrolling moves the entire 3D model vertically up
       and down. This lets users pan through the leg
       from hip to foot smoothly.
       
       Zoom is still available via:
       - Ctrl+Scroll (or Cmd+Scroll on Mac)
       - Pinch gesture on trackpad/touch
       ============================================ */
    canvas.addEventListener('wheel', (event) => {
      // Check if Ctrl/Cmd is held - if so, allow normal zoom
      if (event.ctrlKey || event.metaKey) {
        return; // Let default OrbitControls zoom handle this
      }

      // Prevent default zoom behavior
      event.preventDefault();

      if (!loadedModel) return;

      // Move model up or down based on scroll direction
      // Negative deltaY = scrolling up = move model up
      // Positive deltaY = scrolling down = move model down
      const scrollSpeed = 0.003; // Adjust sensitivity
      loadedModel.position.y += event.deltaY * scrollSpeed;

      // Also move the controls target so rotation stays centered
      controls.target.y += event.deltaY * scrollSpeed;
    }, { passive: false }); // passive: false allows preventDefault()

    /* ============================================
       CLOSE BUTTON HANDLER
       ============================================ */
    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      closeInfoPanel();
      isPanelOpen = false;
    });

    /* ============================================
       RESIZE HANDLER
       ============================================ */
    const resizeObserver = new ResizeObserver(() => {
      const width = container.clientWidth;
      const height = container.clientHeight;
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height);
    });
    resizeObserver.observe(container);

    /* ============================================
       ANIMATION LOOP
       ============================================ */
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    /* ============================================
       UI HELPER FUNCTIONS
       ============================================ */

    function showInjuryPanel(info, key) {
      panelTitle.textContent = info.displayName;
      partTag.textContent = key;
      partDesc.textContent = info.description;

      injuriesList.innerHTML = '';

      info.injuries.forEach(injury => {
        const card = document.createElement('div');
        card.className = 'injury-card';
        
        let severityHTML = '<div class="severity">';
        for (let i = 1; i <= 3; i++) {
          const isActive = i <= injury.severity;
          const isHigh = i === 3 && injury.severity === 3;
          severityHTML += `<div class="severity-dot ${isActive ? 'active' : ''} ${isHigh ? 'sev-high' : ''}"></div>`;
        }
        severityHTML += '</div>';
        severityHTML += '<span class="severity-label">Severity</span>';

        card.innerHTML = `
          <div class="injury-name">${injury.name}</div>
          <div class="injury-detail">${injury.detail}</div>
          ${severityHTML}
        `;
        injuriesList.appendChild(card);
      });

      panelPlaceholder.style.display = 'none';
      panelContent.style.display = 'block';
      infoPanel.classList.add('visible');
    }

    function closeInfoPanel() {
      infoPanel.classList.remove('visible');
      setTimeout(() => {
        panelContent.style.display = 'none';
        panelPlaceholder.style.display = 'flex';
      }, 300);
    }

    function highlightMesh(mesh) {
      if (!mesh.material) return;
      
      const originalEmissive = mesh.material.emissive ? mesh.material.emissive.getHex() : 0x000000;
      mesh.material.emissive.setHex(0x1e40af);
      
      setTimeout(() => {
        if (mesh.material && mesh.material.emissive) {
          mesh.material.emissive.setHex(originalEmissive);
        }
      }, 300);
    }

    console.log('- Right click drag: Pan camera');
    console.log('- Scroll wheel: Move model up/down');
    console.log('- Ctrl+Scroll: Zoom in/out');
