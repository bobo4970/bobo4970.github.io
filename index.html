<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AROBICMD | Interactive Leg Injury Explorer</title>
  
  <style>
    /* ============================================
       CSS RESET & BASE STYLES
       ============================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0a0a0f;
      color: #e1e1e6;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ============================================
       DARK DOT GRID BACKGROUND
       Creates a subtle dot grid pattern on dark background
       ============================================ */
    #dot-grid-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      background-color: #0a0a0f;
      background-image: radial-gradient(#1a1a2e 1px, transparent 1px);
      background-size: 24px 24px;
    }

    /* ============================================
       HEADER / BRANDING
       Centered logo with dark theme
       ============================================ */
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: rgba(10, 10, 15, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
      z-index: 100;
    }

    #header h1 {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: 3px;
      color: #ffffff;
    }

    #header .brand-accent {
      color: #3b82f6;
    }

    #header .subtitle {
      position: absolute;
      right: 24px;
      font-size: 0.75rem;
      color: #64748b;
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    /* ============================================
       MAIN LAYOUT: CANVAS + INFO PANEL
       ============================================ */
    #main-container {
      position: fixed;
      top: 64px;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      height: calc(100vh - 64px);
      z-index: 1;
    }

    /* 3D Canvas container */
    #canvas-container {
      flex: 1;
      position: relative;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    #canvas-container canvas:active {
      cursor: grabbing;
    }

    /* ============================================
       INSTRUCTION OVERLAY
       ============================================ */
    #instruction-overlay {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(8px);
      padding: 10px 18px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 0.8rem;
      color: #94a3b8;
      text-align: center;
      pointer-events: none;
      transition: opacity 0.5s ease;
      z-index: 10;
    }

    #instruction-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ============================================
       RIGHT INFO PANEL
       Dark themed panel that slides in
       ============================================ */
    #info-panel {
      width: 400px;
      background: rgba(15, 15, 20, 0.95);
      backdrop-filter: blur(16px);
      border-left: 1px solid rgba(255, 255, 255, 0.06);
      padding: 24px;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      z-index: 50;
    }

    #info-panel.visible {
      transform: translateX(0);
    }

    /* Panel header */
    #panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    #panel-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #f8fafc;
    }

    #close-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    #close-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      color: #f1f5f9;
    }

    /* Selected part visual indicator */
    #part-tag {
      display: inline-block;
      padding: 4px 10px;
      background: rgba(59, 130, 246, 0.15);
      color: #3b82f6;
      font-size: 0.7rem;
      font-weight: 600;
      border-radius: 6px;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Description text */
    #part-description {
      font-size: 0.9rem;
      line-height: 1.6;
      color: #94a3b8;
      margin-bottom: 20px;
    }

    /* Injury list header */
    #injuries-heading {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      margin-bottom: 12px;
    }

    /* Individual injury cards */
    .injury-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 10px;
      transition: all 0.2s;
    }

    .injury-card:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .injury-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: #f1f5f9;
      margin-bottom: 4px;
    }

    .injury-detail {
      font-size: 0.82rem;
      color: #64748b;
      line-height: 1.5;
    }

    /* Severity indicator dots */
    .severity {
      display: inline-flex;
      gap: 4px;
      margin-top: 8px;
      align-items: center;
    }
    
    .severity-label {
      font-size: 0.65rem;
      color: #64748b;
      margin-left: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .severity-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #1e293b;
      transition: background 0.2s;
    }
    .severity-dot.active { background: #3b82f6; }
    .severity-dot.active.sev-high { background: #ef4444; }

    /* Placeholder when nothing selected */
    #panel-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #475569;
      text-align: center;
      padding: 40px 20px;
    }
    #panel-placeholder svg {
      width: 48px;
      height: 48px;
      margin-bottom: 16px;
      opacity: 0.4;
      color: #64748b;
    }
    
    #panel-placeholder p {
      font-size: 0.85rem;
      line-height: 1.5;
    }

    /* ============================================
       LOADING SCREEN
       ============================================ */
    #loader {
      position: fixed;
      inset: 0;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.4s ease;
    }

    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #1e293b;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loader-text {
      margin-top: 16px;
      font-size: 0.85rem;
      color: #64748b;
    }

    /* ============================================
       RESPONSIVE ADJUSTMENTS
       ============================================ */
    @media (max-width: 900px) {
      #info-panel {
        width: 100%;
        position: absolute;
        top: 0;
        right: 0;
        height: 100%;
        z-index: 50;
      }
      #header .subtitle {
        display: none;
      }
    }
  </style>
  
  <!-- THREE.JS IMPORT MAP -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>

  <!-- DARK DOT GRID BACKGROUND -->
  <div id="dot-grid-bg"></div>

  <!-- LOADING SCREEN -->
  <div id="loader">
    <div class="spinner"></div>
    <div id="loader-text">Loading 3D Model...</div>
  </div>

  <!-- HEADER: Centered AROBICMD logo -->
  <div id="header">
    <h1>AROBIC<span class="brand-accent">MD</span></h1>
    <span class="subtitle">Interactive Leg Injury Explorer</span>
  </div>

  <!-- MAIN APP CONTAINER -->
  <div id="main-container">
    
    <!-- 3D VIEWPORT -->
    <div id="canvas-container">
      <canvas id="webgl-canvas"></canvas>
      
      <!-- Instructions overlay -->
      <div id="instruction-overlay">
        Click any part of the leg to explore common injuries
      </div>
    </div>

    <!-- RIGHT INFO PANEL -->
    <div id="info-panel">
      <!-- Placeholder shown when no part is selected -->
      <div id="panel-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
          <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7Z"/>
        </svg>
        <p>Select a part of the leg to view<br>common injuries & strains</p>
      </div>

      <!-- Dynamic content (hidden until selection) -->
      <div id="panel-content" style="display: none;">
        <div id="panel-header">
          <div id="panel-title">Select a Region</div>
          <button id="close-btn" title="Close panel">✕</button>
        </div>
        <div id="part-tag">Region</div>
        <div id="part-description">Description will appear here.</div>
        
        <div id="injuries-heading">Common Injuries</div>
        <div id="injuries-list">
          <!-- Injury cards injected via JS -->
        </div>
      </div>
    </div>

  </div>

  <!-- MAIN JAVASCRIPT MODULE -->
  <script type="module">
    // Import Three.js components
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // DOM element references
    const container = document.getElementById('canvas-container');
    const canvas = document.getElementById('webgl-canvas');
    const loader = document.getElementById('loader');
    const instructionOverlay = document.getElementById('instruction-overlay');
    const infoPanel = document.getElementById('info-panel');
    const panelPlaceholder = document.getElementById('panel-placeholder');
    const panelContent = document.getElementById('panel-content');
    const panelTitle = document.getElementById('panel-title');
    const partTag = document.getElementById('part-tag');
    const partDesc = document.getElementById('part-description');
    const injuriesList = document.getElementById('injuries-list');
    const closeBtn = document.getElementById('close-btn');

    /* ============================================
       INJURY DATA MAPPING
       
       IMPORTANT: Update the KEYS to match your actual model's mesh names.
       Check the browser console after clicking a part to see the exact name.
       ============================================ */
    const INJURY_DATA = {
      "UpperLeg": {
        displayName: "Upper Leg (Quadriceps & Hamstrings)",
        description: "The upper leg contains powerful muscle groups essential for running and cycling. The quadriceps extend the knee while the hamstrings flex it.",
        injuries: [
          { name: "Quadriceps Strain", detail: "Overstretching or tearing of thigh muscles, common in sprinters and cyclists during steep climbs.", severity: 2 },
          { name: "Hamstring Strain", detail: "Frequent in runners during late swing phase. Ranges from mild tightness to complete muscle rupture.", severity: 3 },
          { name: "IT Band Syndrome", detail: "Friction of the iliotibial band against the lateral femur. Common in long-distance runners.", severity: 2 }
        ]
      },
      "LowerLeg": {
        displayName: "Lower Leg (Calves & Shin)",
        description: "The lower leg handles impact absorption and propulsion. Key structures include the gastrocnemius, soleus, and tibialis anterior.",
        injuries: [
          { name: "Calf Strain (Tennis Leg)", detail: "Tearing of calf muscles during explosive push-off movements. Very common in runners.", severity: 2 },
          { name: "Shin Splints (MTSS)", detail: "Pain along the shin bone from repetitive stress. Often seen when increasing mileage too quickly.", severity: 1 },
          { name: "Achilles Tendinopathy", detail: "Degeneration of the Achilles tendon from chronic overuse. Pain is typically worse in the morning.", severity: 3 }
        ]
      },
      "Knee": {
        displayName: "Knee Joint",
        description: "The knee is a complex hinge joint bearing significant load during running and cycling. It relies on ligaments, menisci, and cartilage for stability.",
        injuries: [
          { name: "Runner's Knee (Patellofemoral Pain)", detail: "Pain around the kneecap from improper tracking. The most common running-related injury.", severity: 2 },
          { name: "Meniscus Tear", detail: "Damage to knee cartilage from twisting or impact. Can cause catching or locking sensations.", severity: 3 },
          { name: "Patellar Tendinitis", detail: "Inflammation of the tendon connecting kneecap to shin. Common in cyclists with low seat height.", severity: 2 },
          { name: "ACL Sprain", detail: "Ligament injury from sudden stops or pivots. Less common in straight-line running but possible.", severity: 3 }
        ]
      },
      "Ankle": {
        displayName: "Ankle & Foot",
        description: "The ankle connects the leg to the foot and absorbs ground reaction forces. Stability depends on ligaments, tendons, and bone structure.",
        injuries: [
          { name: "Ankle Sprain", detail: "Ligament overstretching from rolling the ankle. Most common acute injury in all athletes.", severity: 2 },
          { name: "Plantar Fasciitis", detail: "Inflammation of the foot's arch ligament. Sharp heel pain, especially with first steps in morning.", severity: 2 },
          { name: "Achilles Tendinopathy", detail: "Degeneration of the Achilles tendon from chronic overuse. Pain is typically worse in the morning.", severity: 3 }
        ]
      },
      "Hip": {
        displayName: "Hip & Glutes",
        description: "The hip is a ball-and-socket joint providing stability and power. Strong glutes are critical for running economy and cycling efficiency.",
        injuries: [
          { name: "Hip Flexor Strain", detail: "Overuse injury from repetitive leg lifting. Common in cyclists with aggressive riding positions.", severity: 2 },
          { name: "Piriformis Syndrome", detail: "Tight piriformis muscle compressing the sciatic nerve. Causes buttock pain radiating down the leg.", severity: 2 },
          { name: "Trochanteric Bursitis", detail: "Inflammation of the bursa on the outer hip. Pain worsens when lying on affected side.", severity: 1 }
        ]
      }
    };

    /* ============================================
       THREE.JS SCENE SETUP
       ============================================ */
    
    // Create scene with dark background
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0f); // Match the dark theme
    
    // Removed fog for cleaner look on dark background
    // scene.fog = new THREE.Fog(0x0a0a0f, 10, 50);

    // Camera setup
    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
    camera.position.set(0, 1.5, 5);

    // Renderer with dark theme optimizations
    const renderer = new THREE.WebGLRenderer({ 
      canvas: canvas,
      antialias: true,
      alpha: false
    });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;

    // Orbit controls with smooth damping
    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 2;
    controls.maxDistance = 12;
    controls.target.set(0, 1, 0);
    controls.update();

    /* ============================================
       LIGHTING SETUP
       Adjusted for dark theme - slightly brighter to maintain visibility
       ============================================ */
    
    // Ambient light
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    // Main directional light
    const mainLight = new THREE.DirectionalLight(0xffffff, 1.8);
    mainLight.position.set(3, 5, 4);
    mainLight.castShadow = true;
    scene.add(mainLight);

    // Fill light
    const fillLight = new THREE.DirectionalLight(0xc8d6e5, 1.0);
    fillLight.position.set(-4, 2, -2);
    scene.add(fillLight);

    // Rim light with subtle blue tint
    const rimLight = new THREE.DirectionalLight(0x3b82f6, 0.7);
    rimLight.position.set(0, 3, -5);
    scene.add(rimLight);

    // Hemisphere light
    const hemiLight = new THREE.HemisphereLight(0x1e293b, 0x0f172a, 0.5);
    scene.add(hemiLight);

    /* ============================================
       GRID REMOVED
       As requested, the grid helper and ground plane have been removed.
       The model now floats in the dark space with the dot grid background.
       ============================================ */
    
    /* ============================================
       LOADING THE 3D MODEL
       ============================================ */
    
    let loadedModel = null;
    const modelLoader = new GLTFLoader();

    modelLoader.load(
      './leg_model.glb', // Path to your model
      
      // Success callback
      (gltf) => {
        console.log('Model loaded successfully');
        loadedModel = gltf.scene;
        
        // Auto-center the model
        const boundingBox = new THREE.Box3().setFromObject(loadedModel);
        const center = boundingBox.getCenter(new THREE.Vector3());
        const size = boundingBox.getSize(new THREE.Vector3());
        
        // Center at origin and lift to sit properly
        loadedModel.position.sub(center);
        loadedModel.position.y += size.y / 2;
        
        // Scale to fit viewport nicely
        const maxDimension = Math.max(size.x, size.y, size.z);
        const targetSize = 3;
        const scale = targetSize / maxDimension;
        loadedModel.scale.setScalar(scale);
        
        // Add to scene
        scene.add(loadedModel);
        
        // Store original colors and enable materials for hover effects
        loadedModel.traverse((child) => {
          if (child.isMesh) {
            child.userData.originalColor = child.material ? child.material.color.clone() : null;
            child.userData.originalEmissive = child.material && child.material.emissive ? child.material.emissive.getHex() : 0x000000;
          }
        });
        
        // Frame camera around model
        const cameraDistance = targetSize * 1.6;
        camera.position.set(cameraDistance * 0.7, cameraDistance * 0.4, cameraDistance);
        controls.target.set(0, targetSize / 4, 0);
        controls.update();
        
        // Hide loading screen
        loader.classList.add('hidden');
        
        // Log mesh names for mapping
        console.log('=== MESH NAMES FROM YOUR MODEL ===');
        loadedModel.traverse((child) => {
          if (child.isMesh) {
            console.log(`"${child.name || 'unnamed'}" → Add to INJURY_DATA`);
          }
        });
      },
      
      // Progress callback
      (xhr) => {
        if (xhr.total > 0) {
          const percent = Math.round((xhr.loaded / xhr.total) * 100);
          document.getElementById('loader-text').textContent = `Loading 3D Model... ${percent}%`;
        }
      },
      
      // Error callback
      (error) => {
        console.error('Error loading model:', error);
        document.getElementById('loader-text').innerHTML = `
          <strong style="color: #ef4444;">Failed to load model</strong><br>
          <span style="font-size: 0.75rem; color: #64748b;">
            Make sure leg_model.glb is in the same folder.
          </span>
        `;
      }
    );

    /* ============================================
       RAYCASTER & CLICK/DRAG HANDLING
       ============================================ */
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    // Track interaction state
    let hasInteracted = false;
    let isPanelOpen = false;

    // Track mouse down/up for distinguishing clicks from drags
    let mouseDownPosition = { x: 0, y: 0 };
    let mouseDownTime = 0;
    const DRAG_THRESHOLD = 5; // pixels of movement to consider it a drag, not a click

    /**
     * Handle mouse down - record position and time
     */
    canvas.addEventListener('mousedown', (event) => {
      mouseDownPosition.x = event.clientX;
      mouseDownPosition.y = event.clientY;
      mouseDownTime = Date.now();
    });

    /**
     * Handle mouse up - determine if it was a click or drag
     * Only process raycasting if it was a click (minimal movement, short duration)
     */
    canvas.addEventListener('mouseup', (event) => {
      if (!loadedModel) return;

      // Calculate how far the mouse moved since mousedown
      const deltaX = Math.abs(event.clientX - mouseDownPosition.x);
      const deltaY = Math.abs(event.clientY - mouseDownPosition.y);
      const distanceMoved = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
      
      // Calculate how long the mouse was held down
      const timeHeld = Date.now() - mouseDownTime;

      // If the mouse moved more than the threshold, it was a drag/rotation
      // NOT a click, so don't trigger raycasting
      if (distanceMoved > DRAG_THRESHOLD) {
        return; // This was a drag, not a click - ignore
      }

      // Also ignore if held too long (likely a drag that didn't move much)
      if (timeHeld > 500) {
        return;
      }

      // This was a legitimate click - process it
      handleClick(event);
    });

    /**
     * Process a valid click event with raycasting
     */
    function handleClick(event) {
      // Calculate mouse position in normalized device coordinates (-1 to +1)
      const rect = canvas.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      // Update raycaster with camera and mouse position
      raycaster.setFromCamera(mouse, camera);

      // Find intersected meshes
      const intersects = raycaster.intersectObject(loadedModel, true);

      if (intersects.length > 0) {
        // Get the closest intersected mesh
        const clickedMesh = intersects[0].object;
        
        // Hide instruction overlay on first interaction
        if (!hasInteracted) {
          instructionOverlay.classList.add('hidden');
          hasInteracted = true;
        }

        // Visual feedback on click
        highlightMesh(clickedMesh);

        // Look up injury data
        let injuryInfo = null;
        let matchedKey = '';

        if (INJURY_DATA[clickedMesh.name]) {
          injuryInfo = INJURY_DATA[clickedMesh.name];
          matchedKey = clickedMesh.name;
        } else {
          // Try partial matching
          for (const key of Object.keys(INJURY_DATA)) {
            if (clickedMesh.name.toLowerCase().includes(key.toLowerCase()) ||
                key.toLowerCase().includes(clickedMesh.name.toLowerCase())) {
              injuryInfo = INJURY_DATA[key];
              matchedKey = key;
              break;
            }
          }
        }

        if (injuryInfo) {
          // Show injury panel - it will STAY OPEN until another part is clicked
          showInjuryPanel(injuryInfo, matchedKey);
          isPanelOpen = true;
        } else {
          // No data mapped yet
          console.log(`Clicked "${clickedMesh.name}" - Add to INJURY_DATA`);
          showInjuryPanel({
            displayName: clickedMesh.name || "Unknown Region",
            description: "Injury data not yet mapped for this region. Check console for mesh name.",
            injuries: [
              { name: "Data Pending", detail: "Developer: Add this mesh name to the INJURY_DATA object.", severity: 0 }
            ]
          }, clickedMesh.name);
          isPanelOpen = true;
        }
      } else {
        // Clicked on empty space - close panel
        closeInfoPanel();
        isPanelOpen = false;
      }
    }

    /* ============================================
       HOVER EFFECTS
       Visual feedback on mouse move over model parts
       ============================================ */
    canvas.addEventListener('mousemove', (event) => {
      if (!loadedModel) return;

      const rect = canvas.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(loadedModel, true);

      // Reset all meshes hover state
      loadedModel.traverse((child) => {
        if (child.isMesh && child.material) {
          child.material.emissive.setHex(child.userData.originalEmissive || 0x000000);
        }
      });

      // Highlight hovered mesh
      if (intersects.length > 0) {
        const hoveredMesh = intersects[0].object;
        if (hoveredMesh.material) {
          hoveredMesh.material.emissive.setHex(0x1a2332); // Subtle dark glow
        }
        canvas.style.cursor = 'pointer';
      } else {
        canvas.style.cursor = 'grab';
      }
    });

    /* ============================================
       CLOSE BUTTON HANDLER
       Only closes panel when user explicitly clicks X
       ============================================ */
    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation(); // Prevent this from triggering canvas click handler
      closeInfoPanel();
      isPanelOpen = false;
    });

    /* ============================================
       RESIZE HANDLER
       ============================================ */
    const resizeObserver = new ResizeObserver(() => {
      const width = container.clientWidth;
      const height = container.clientHeight;
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height);
    });
    resizeObserver.observe(container);

    /* ============================================
       ANIMATION LOOP
       ============================================ */
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    /* ============================================
       UI HELPER FUNCTIONS
       ============================================ */

    /**
     * Displays the injury information in the right sidebar panel.
     * Panel stays open until another part is clicked or X is pressed.
     */
    function showInjuryPanel(info, key) {
      // Update panel content
      panelTitle.textContent = info.displayName;
      partTag.textContent = key;
      partDesc.textContent = info.description;

      // Clear previous injury cards
      injuriesList.innerHTML = '';

      // Generate injury cards
      info.injuries.forEach(injury => {
        const card = document.createElement('div');
        card.className = 'injury-card';
        
        // Build severity dots
        let severityHTML = '<div class="severity">';
        for (let i = 1; i <= 3; i++) {
          const isActive = i <= injury.severity;
          const isHigh = i === 3 && injury.severity === 3;
          severityHTML += `<div class="severity-dot ${isActive ? 'active' : ''} ${isHigh ? 'sev-high' : ''}"></div>`;
        }
        severityHTML += '</div>';
        severityHTML += '<span class="severity-label">Severity</span>';

        card.innerHTML = `
          <div class="injury-name">${injury.name}</div>
          <div class="injury-detail">${injury.detail}</div>
          ${severityHTML}
        `;
        injuriesList.appendChild(card);
      });

      // Show content, hide placeholder
      panelPlaceholder.style.display = 'none';
      panelContent.style.display = 'block';

      // Slide panel into view
      infoPanel.classList.add('visible');
    }

    /**
     * Closes the info panel and shows placeholder.
     */
    function closeInfoPanel() {
      infoPanel.classList.remove('visible');
      
      // Delay for smooth transition
      setTimeout(() => {
        panelContent.style.display = 'none';
        panelPlaceholder.style.display = 'flex';
      }, 300);
    }

    /**
     * Temporarily highlights a clicked mesh
     */
    function highlightMesh(mesh) {
      if (!mesh.material) return;
      
      const originalEmissive = mesh.material.emissive ? mesh.material.emissive.getHex() : 0x000000;
      mesh.material.emissive.setHex(0x1e40af); // Blue highlight
      
      setTimeout(() => {
        if (mesh.material && mesh.material.emissive) {
          mesh.material.emissive.setHex(originalEmissive);
        }
      }, 300);
    }

    /* ============================================
       DEVELOPER DEBUG INFO
       ============================================ */
    console.log('%c AROBICMD Leg Explorer Loaded ', 'background: #3b82f6; color: white; padding: 4px 8px; border-radius: 4px;');
    console.log('To map your model parts to injuries:');
    console.log('1. Click on any part of the 3D leg');
    console.log('2. Check console for the mesh name');
    console.log('3. Update INJURY_DATA with that name');
  </script>

</body>
